{% extends "base.html" %}
{% block title %}Delete an entry{% endblock %}

{% block content %}
<h1>Delete an entry?</h1>

<p>{{ entry.date }} — {{ entry.product|default:entry.dish }} ({{ entry.calories }} kcal)</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<a href="{% url 'diary' %}">Cancel</a>
{% endblock %}
