{% extends "base.html" %}
{% block title %}Додати запис{% endblock %}

{% block content %}
<h1>Додати запис у щоденник</h1>

<div class="diary-container">
    <section class="card-block entry-block">
        <h2 class="card-block__title">Новий запис</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Додати</button>
        </form>
    </section>

    <section class="card-block search-block">
        <h2 class="card-block__title">Пошук продукту / страви</h2>
        <div id="search-panel-container"
             hx-get="{% url 'search_panel' %}"
             hx-trigger="load"
             hx-swap="innerHTML">
            <p class="results-empty">Завантаження…</p>
        </div>
    </section>
</div>

<a href="{% url 'diary' %}">← Назад до щоденника</a>
{% endblock %}
