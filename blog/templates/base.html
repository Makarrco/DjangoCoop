<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Підрахунок калорій{% endblock %}</title>
</head>
<body>
    <nav>
        <a href="{% url 'home' %}">Головна</a>
        {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">Профіль</a>
            <a href="{% url 'diary' %}">Щоденник</a>
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit">Вийти ({{ user.username }})</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Увійти</a>
            <a href="{% url 'register' %}">Реєстрація</a>
        {% endif %}
    </nav>

    <hr>

    {% if messages %}
        <ul>
        {% for message in messages %}
            <li>{{ message }}</li>
        {% endfor %}
        </ul>
    {% endif %}

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
